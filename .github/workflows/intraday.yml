name: Intraday Momentum Scalper

on:
  workflow_dispatch:

jobs:
  run-intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Intraday Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_INTRADAY: ${{ secrets.DISCORD_WEBHOOK_INTRADAY }}
        run: python intraday_scanner.py