name: Golden Pocket Sniper

on:
  workflow_dispatch:
  schedule:
    # Runs every 15 minutes, Monday to Friday
    - cron: '*/15 * * * 1-5'

jobs:
  run-fib-sniper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Fibonacci Sniper
        env:
          # Pulls the exact same webhook you added earlier today
          DISCORD_WEBHOOK_INTRADAY: ${{ secrets.DISCORD_WEBHOOK_INTRADAY }}
        run: python fib_sniper.py