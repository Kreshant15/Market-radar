name: Trap Detector Subroutine

on:
  workflow_dispatch:

jobs:
  run-trap-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Check for Divergence Traps
        env:
          DISCORD_WEBHOOK_TRAP: ${{ secrets.DISCORD_WEBHOOK_TRAP }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python trap_detector.py