name: Trap Detector Subroutine

on:
  workflow_dispatch:
  schedule:
    # Runs every 15 minutes during market hours (03:30 to 10:00 UTC -> 09:00 to 15:30 IST) Monday-Friday
    - cron: '*/15 3-10 * * 1-5'

jobs:
  run-trap-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Check for Divergence Traps
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python trap_detector.py