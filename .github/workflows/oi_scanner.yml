```yaml
name: NSE Open Interest Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:


jobs:
  run-oi-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Open Interest Engine
        env:
          DISCORD_WEBHOOK_INTRADAY: ${{ secrets.DISCORD_WEBHOOK_INTRADAY }}
        run: python oi_engine.py

```
