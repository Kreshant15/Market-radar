name: Pre-Market Morning Briefing

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 03:00 UTC, which is EXACTLY 08:30 AM IST (Right before Indian market open)
    - cron: '0 3 * * *'

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Morning Briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_PREMARKET: ${{ secrets.DISCORD_WEBHOOK_PREMARKET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pre_market_briefing.py