name: Technical Level Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * 1-5' # Runs every 15 minutes, Monday-Friday

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Technical Monitor
        env:
          # Passing the newly created secret to the Python script
          DISCORD_WEBHOOK_FORADAR: ${{ secrets.DISCORD_WEBHOOK_FORADAR }}
        run: python technical_monitor.py