name: Technical Level Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 3-10 * * 1-5'  # 8:30 AM – 3:30 PM IST only (UTC+5:30)

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Technical Monitor
        env:
          DISCORD_WEBHOOK_FORADAR: ${{ secrets.DISCORD_WEBHOOK_FORADAR }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python technical_monitor.py