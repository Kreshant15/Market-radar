name: Post-Market Performance Verdict

on:
  workflow_dispatch:

jobs:
  run-verdict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Verdict Engine
        env:
          DISCORD_WEBHOOK_LEDGER: ${{ secrets.DISCORD_WEBHOOK_LEDGER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python verdict_engine.py