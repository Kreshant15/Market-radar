name: Friday Portfolio Tear Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * 5'

jobs:
  run-tearsheet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Generate Tear Sheet
        env:
          DISCORD_WEBHOOK_TEARSHEET: ${{ secrets.DISCORD_WEBHOOK_TEARSHEET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python weekly_tearsheet.py